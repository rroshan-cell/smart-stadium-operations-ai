name: Keep Render Awake

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render Application
        run: |
          curl -L --silent --show-error \
          https://smart-stadium-operations-ai-1.onrender.com/health

      - name: Finished
        run: echo "Render ping successful."